<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Xbase1 - Build reliable systems</title>
    <meta
      name="description"
      content="Talk to Xbase1 about cloud architecture, AI deployment, infrastructure risks, or your production roadmap."
    >
    <link rel="icon" href="assets/xbase1-mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="contact">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" data-header>
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="Xbase1 home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">
            <strong>XBASE1</strong>
            <small>Engineering</small>
          </span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" data-nav-toggle>
          <span></span>
          <span></span>
          <span class="sr-only">Menu</span>
        </button>

        <div class="nav-menu" id="site-menu" data-nav-menu>
          <a href="about.html">About</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#stack">Stack</a>
          <a href="index.html#approach">Approach</a>
          <a href="index.html#work">Work</a>
          <a aria-current="page" href="contact.html">Contact</a>
        </div>

        <div class="nav-extra">
          <span>EN</span>
          <a href="contact.html">Book a call</a>
        </div>
      </nav>
    </header>

    <main id="main">
      <section class="contact-hero no-scroll-lock">
        <div class="section-inner contact-grid">
          <div class="contact-copy reveal">
            <p class="eyebrow">Contact</p>
            <h1>Let's build the cloud and AI foundation your product needs.</h1>
            <div class="contact-note">
              <span>Prefer email?</span>
              <a href="mailto:hello@xbase1.net">hello@xbase1.net</a>
            </div>
          </div>

          <form class="contact-form reveal" data-contact-form>
            <div class="form-grid">
              <label>
                <span>Name</span>
                <input name="name" type="text" autocomplete="name" required>
              </label>
              <label>
                <span>Email</span>
                <input name="email" type="email" autocomplete="email" required>
              </label>
              <label>
                <span>Company</span>
                <input name="company" type="text" autocomplete="organization">
              </label>
              <label>
                <span>Website</span>
                <input name="website" type="url" autocomplete="url" placeholder="https://">
              </label>
            </div>

            <!-- Removed 'What do you need help with?' and 'Project stage' per request -->

            <label>
              <span>Message</span>
              <textarea name="message" rows="3" required></textarea>
            </label>

            <button class="button button-primary form-submit" type="submit">Schedule a strategy call</button>
            <p class="form-status" data-form-status role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-canvas">
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="about.html">About</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#stack">Stack</a>
          <a href="index.html#work">Work</a>
          <a href="contact.html">Contact</a>
        </nav>

        <div class="footer-contact">
          <span>Contact</span>
          <a href="mailto:hello@xbase1.net">hello@xbase1.net</a>
          <a href="contact.html">Book a consultation</a>
        </div>

        <div class="footer-location">
          <span aria-hidden="true"></span>
          <p>RC: 9638753</p>
        </div>

        <strong class="footer-wordmark" aria-hidden="true">xbase1</strong>

        <div class="footer-bottom">
        </div>
      </div>
    </footer>

    <script src="three-scroll.js"></script>
    <script src="script.js"></script>
  </body>
</html>
